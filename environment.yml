name: promoagentai
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # Core framework
    - streamlit>=1.29.0
    - crewai>=0.80.0
    - requests>=2.31.0
    - python-dotenv>=1.0.0

    # XML processing
    - xmltodict==0.13.0
    - lxml==4.9.3

    # LLM Providers (all 3 supported)
    # OpenAI
    - openai>=1.13.3
    - langchain-openai>=0.1.0

    # Anthropic (Claude) - uses same API as Claude Code
    - anthropic>=0.18.0
    - langchain-anthropic>=0.1.0

    # Google (Gemini)
    - google-generativeai>=0.4.1
    - langchain-google-genai>=1.0.0

    # Additional utilities
    - aiohttp==3.9.1
    - tenacity==8.2.3
    - pydantic>=2.0.0
